<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hippius S3 Image Gallery</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
    .gallery img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
    .info { color: #666; font-size: 0.9rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Image Gallery</h1>
  <p>Images served from a public Hippius S3 bucket.</p>

  <div class="gallery">
    <!-- Replace with your public bucket URLs -->
    <img src="https://s3.hippius.com/my-gallery/photo1.jpg" alt="Photo 1">
    <img src="https://s3.hippius.com/my-gallery/photo2.jpg" alt="Photo 2">
    <img src="https://s3.hippius.com/my-gallery/photo3.jpg" alt="Photo 3">
  </div>

  <p class="info">
    Make your bucket public, upload images, then reference them as
    <code>https://s3.hippius.com/{bucket}/{key}</code>.
  </p>
</body>
</html>
